name: Docker Scenario Tests

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  unit-tests:
    name: Go Unit Tests (internal)
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Run unit tests
        run: |
          go test -v ./internal/...
  docker-scenarios:
    name: RKE2 docker scenarios (${{ matrix.exec_mode }}, ${{ matrix.scenario }})
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        exec_mode:
          - binary
          - pod
        scenario:
          - image_cve
          - image_list
          - patch_components
          - flannel_traefik_patch_components
          - image_cve_local
          - merging_values
          - reconcile_upgrade
          - airgap
          - multi_patcher_reconcile
          - patch_reconcile_component_ha
        exclude:
          - exec_mode: pod
            scenario: image_cve_local
          - exec_mode: pod
            scenario: airgap
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Build rke2-patcher binary
        run: |
          mkdir -p ./bin
          CGO_ENABLED=0 go build -ldflags "-X github.com/rancher/rke2-patcher/internal/version.Version=ci" -o ./bin/rke2-patcher .

      - name: Load required kernel modules
        run: |
          sudo modprobe br_netfilter overlay

      - name: Run docker scenario test
        env:
          EXEC_MODE: ${{ matrix.exec_mode }}
        run: |
          make_target="test-docker-${{ matrix.scenario }}"

          if [ "${{ matrix.scenario }}" = "airgap" ]; then
            make "$make_target" EXEC_MODE="${EXEC_MODE}" IMAGE_BUNDLES_DIR="$(pwd)/tests/docker/airgap/bundles"
          else
            make "$make_target" EXEC_MODE="${EXEC_MODE}"
          fi
